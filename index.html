<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Watt-Wise AI Auditor</title>
    <style>
        body { font-family: sans-serif; background: #f0fdf4; text-align: center; padding: 20px; color: #166534; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #bbf7d0; border-radius: 5px; }
        button { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Eco-Pulse AI Auditor 🌍</h2>
        <p>احسب توفيرك لعام 2026</p>
        <select id="device">
            <option value="2000">تكييف (AC)</option>
            <option value="200">ثلاجة</option>
            <option value="50">إضاءة</option>
        </select>
        <input type="number" id="hours" placeholder="عدد ساعات التشغيل يومياً">
        <button onclick="calculate()">حلل بذكاء AI</button>
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            let watts = document.getElementById('device').value;
            let hours = document.getElementById('hours').value;
            if(!hours) return;
            let kwh = (watts * hours) / 1000;
            let carbon = kwh * 0.4; // نسبة تقريبية لانبعاثات الكربون
            document.getElementById('result').innerHTML = `
                استهلاكك: ${kwh} kWh <br>
                بصمتك الكربونية: ${carbon.toFixed(2)} kg CO2 <br>
                <span style="color: #15803d;">بتقليل ساعة واحدة، توفر 15% من الانبعاثات!</span>
            `;
        }
    </script>
</body>
</html>
